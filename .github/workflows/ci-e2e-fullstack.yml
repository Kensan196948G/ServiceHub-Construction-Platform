name: E2E Fullstack Tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: e2e-fullstack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-fullstack:
    name: Fullstack E2E (Docker Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build services
        run: docker compose -f docker-compose.test.yml build --parallel
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

      - name: Start background services
        run: docker compose -f docker-compose.test.yml up -d db redis api frontend

      - name: Wait for api to be healthy
        run: |
          for i in $(seq 1 36); do
            if docker compose -f docker-compose.test.yml exec -T api curl -sf http://localhost:8000/health/live; then
              echo "api is healthy"
              break
            fi
            echo "Waiting for api... ($i/36)"
            sleep 5
          done

      - name: Wait for frontend to be healthy
        run: |
          for i in $(seq 1 24); do
            if docker compose -f docker-compose.test.yml exec -T frontend wget -qO- http://localhost:3000/ > /dev/null 2>&1; then
              echo "frontend is healthy"
              break
            fi
            echo "Waiting for frontend... ($i/24)"
            sleep 5
          done

      - name: Run Playwright fullstack tests
        run: docker compose -f docker-compose.test.yml run --rm playwright

      - name: Copy Playwright artifacts
        if: always()
        run: |
          mkdir -p playwright-report-fullstack test-results
          CID=$(docker compose -f docker-compose.test.yml ps -q playwright 2>/dev/null || true)
          if [ -n "$CID" ]; then
            docker cp "$CID:/app/playwright-report-fullstack/." playwright-report-fullstack/ 2>/dev/null || true
            docker cp "$CID:/app/test-results/." test-results/ 2>/dev/null || true
          fi

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-fullstack-report
          path: playwright-report-fullstack/
          retention-days: 14

      - name: Upload failure screenshots and videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-fullstack-results
          path: test-results/
          retention-days: 7

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== API logs (last 100 lines) ==="
          docker compose -f docker-compose.test.yml logs api --tail=100
          echo "=== Frontend logs (last 50 lines) ==="
          docker compose -f docker-compose.test.yml logs frontend --tail=50

      - name: Tear down all services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans
