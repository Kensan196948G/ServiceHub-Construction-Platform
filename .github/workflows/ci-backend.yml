name: CI - Backend

on:
  push:
    branches: [main, "feature/**", "fix/**"]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      REDIS_URL: "redis://localhost:6379/0"
      JWT_SECRET_KEY: "test-secret-key-for-ci-only"
      ENVIRONMENT: "test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install aiosqlite pytest-asyncio pytest-cov httpx
      - run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt mypy
      - run: mypy app/ --ignore-missing-imports || true
