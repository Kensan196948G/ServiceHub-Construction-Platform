    --font-mono: "IBM Plex Mono", ui-monospace, monospace;

    /* Type scale — Carbon productive */
    --fs-12: 0.75rem;    /* 12 — caption only, avoid for body */

    --fs-20: 1.25rem;

    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
    --sp-5: 20px; --sp-6: 24px; --sp-7: 32px; --sp-8: 40px;

    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 8px;
    --r-xl: 12px;
    --r-pill: 9999px;

    /* Elevation — subtle, enterprise */
    --e1: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 1px rgba(15, 23, 42, 0.04);
    --e2: 0 4px 12px rgba(15, 23, 42, 0.08), 0 1px 2px rgba(15, 23, 42, 0.04);

    /* Focus — high-contrast 2px outline */
    --focus: 0 0 0 2px var(--white), 0 0 0 4px var(--brand-60);
  }

    z-index: 9999;

  }

/* ═══════════════════════════════════════════════════════════════
   UI PRIMITIVES
   ═══════════════════════════════════════════════════════════════ */
function Badge({ tone = "neutral", size = "md", children }) {
  const toneMap = {
    ok:      { bg: "var(--ok-10)",    fg: "var(--ok-60)",    bd: "var(--ok-20)" },
    warn:    { bg: "var(--warn-10)",  fg: "var(--warn-60)",  bd: "var(--warn-20)" },
    err:     { bg: "var(--err-10)",   fg: "var(--err-60)",   bd: "var(--err-20)" },
    info:    { bg: "var(--brand-10)", fg: "var(--brand-60)", bd: "var(--brand-20)" },
    neutral: { bg: "var(--gray-10)",  fg: "var(--gray-80)",  bd: "var(--gray-20)" },
  };
  const t = toneMap[tone] || toneMap.neutral;
  const padding = size === "sm" ? "2px 8px" : "4px 10px";
  const fontSize = size === "sm" ? "var(--fs-12)" : "var(--fs-14)";
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      padding, borderRadius: "var(--r-pill)",
      fontSize, fontWeight: 600, lineHeight: 1.2,
      background: t.bg, color: t.fg, border: `1px solid ${t.bd}`,
      whiteSpace: "nowrap",
    }}>{children}</span>
  );
}

function Button({ variant = "primary", size = "md", leftIcon, children, onClick, type = "button", full = false, ...rest }) {
  const sizes = {
    sm: { h: "var(--touch)", px: 14, fs: "var(--fs-14)" }, // still 44px for touch
    md: { h: "var(--touch)", px: 18, fs: "var(--fs-14)" },
    lg: { h: 52, px: 22, fs: "var(--fs-16)" },
  };
  const s = sizes[size];
  const variants = {
    primary:   { bg: "var(--brand-60)", fg: "#fff", bd: "var(--brand-60)", hbg: "var(--brand-70)" },
    secondary: { bg: "#fff",            fg: "var(--gray-100)", bd: "var(--gray-30)", hbg: "var(--gray-10)" },
    ghost:     { bg: "transparent",     fg: "var(--gray-100)", bd: "transparent",    hbg: "var(--gray-10)" },
    danger:    { bg: "var(--err-60)",   fg: "#fff", bd: "var(--err-60)", hbg: "#a50b24" },
  };
  const v = variants[variant];
  return (
    <button type={type} onClick={onClick} {...rest}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
        height: s.h, padding: `0 ${s.px}px`, fontSize: s.fs, fontWeight: 600,
        background: v.bg, color: v.fg, border: `1px solid ${v.bd}`,
        borderRadius: "var(--r-md)", transition: "background 0.12s, border 0.12s",
        width: full ? "100%" : "auto", letterSpacing: 0.01,
      }}
      onMouseEnter={(e) => e.currentTarget.style.background = v.hbg}
      onMouseLeave={(e) => e.currentTarget.style.background = v.bg}
    >
      {leftIcon}{children}
    </button>
  );
}

function Card({ children, padding = 24, style = {}, as: Tag = "div", ...rest }) {
  return (
    <Tag {...rest} style={{
      background: "var(--surface)",
      border: "1px solid var(--line)",
      borderRadius: "var(--r-lg)",
      padding,
      ...style,
    }}>{children}</Tag>
  );
}

function StatTile({ label, value, delta, deltaTone = "ok", icon, tone = "brand" }) {
  const tones = {
    brand:  { bg: "var(--brand-10)",  fg: "var(--brand-60)" },
    safety: { bg: "var(--safety-10)", fg: "var(--safety-60)" },
    ok:     { bg: "var(--ok-10)",     fg: "var(--ok-60)" },
    warn:   { bg: "var(--warn-10)",   fg: "var(--warn-60)" },
  };
  const t = tones[tone];
  return (
    <Card padding={20}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: "var(--fs-14)", color: "var(--gray-70)", fontWeight: 500, marginBottom: 4 }}>{label}</div>

/* Line / Area chart — SVG, no library */
function CostChart() {
  const months = ["11月", "12月", "1月", "2月", "3月", "4月"];
  const planned = [10, 24, 38, 55, 68, 78];
  const actual  = [9,  22, 35, 50, 62, 71];
  const W = 600, H = 220, PAD = { t: 20, r: 20, b: 36, l: 44 };
  const plotW = W - PAD.l - PAD.r;
  const plotH = H - PAD.t - PAD.b;
  const maxV = 100;
  const xAt = (i) => PAD.l + (i / (months.length - 1)) * plotW;
  const yAt = (v) => PAD.t + (1 - v / maxV) * plotH;

  const areaPath = `M ${xAt(0)} ${yAt(0)} ` +
    actual.map((v, i) => `L ${xAt(i)} ${yAt(v)}`).join(" ") +
    ` L ${xAt(actual.length - 1)} ${yAt(0)} Z`;
  const actualLine = `M ` + actual.map((v, i) => `${xAt(i)} ${yAt(v)}`).join(" L ");
  const plannedLine = `M ` + planned.map((v, i) => `${xAt(i)} ${yAt(v)}`).join(" L ");

  return (
    <Card padding={24}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
        <div>
          <h3 style={{ margin: 0, fontSize: "var(--fs-18)", fontWeight: 600, color: "var(--gray-100)" }}>原価予実対比 — 全案件累計</h3>
          <p style={{ margin: "4px 0 0", fontSize: "var(--fs-14)", color: "var(--gray-70)" }}>過去6ヶ月 · 予算達成率 91.0%</p>
        </div>
        <div style={{ display: "flex", gap: 16, fontSize: "var(--fs-14)" }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--gray-80)" }}>
            <span style={{ width: 12, height: 2, background: "var(--gray-50)" }} />計画
          </span>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--gray-80)" }}>
            <span style={{ width: 12, height: 3, background: "var(--brand-60)" }} />実績
          </span>
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block", maxHeight: 240 }} role="img" aria-label="原価予実対比チャート">
        {/* gridlines */}
        {[0, 25, 50, 75, 100].map((v) => (
          <g key={v}>
            <line x1={PAD.l} x2={W - PAD.r} y1={yAt(v)} y2={yAt(v)} stroke="var(--gray-20)" strokeWidth="1" />
            <text x={PAD.l - 8} y={yAt(v) + 4} fill="var(--gray-60)" fontSize="11" textAnchor="end" fontFamily="var(--font-mono)">{v}M</text>
          </g>
        ))}
        {/* x labels */}
        {months.map((m, i) => (
          <text key={m} x={xAt(i)} y={H - 12} fill="var(--gray-70)" fontSize="12" textAnchor="middle">{m}</text>
        ))}
        {/* area */}
        <path d={areaPath} fill="var(--brand-60)" opacity="0.1" />
        {/* planned (dashed) */}
        <path d={plannedLine} fill="none" stroke="var(--gray-50)" strokeWidth="2" strokeDasharray="4 4" />
        {/* actual */}
        <path d={actualLine} fill="none" stroke="var(--brand-60)" strokeWidth="2.5" />
        {/* points */}
        {actual.map((v, i) => (
          <circle key={i} cx={xAt(i)} cy={yAt(v)} r="4" fill="#fff" stroke="var(--brand-60)" strokeWidth="2" />
        ))}
      </svg>
    </Card>
  );
}

/* ═══════════════════════════════════════════════════════════════
   COMMAND PALETTE (Cmd+K) — global search
   ═══════════════════════════════════════════════════════════════ */
function CommandPalette({ open, onClose, onNavigate }) {
  const [q, setQ] = useState("");
  const inputRef = useRef(null);

  useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 20); }, [open]);

  const items = useMemo(() => {
    const base = [
      { type: "nav", label: "ダッシュボード", target: "dashboard", kw: "dashboard ホーム 概要" },
      { type: "nav", label: "工事案件一覧", target: "projects", kw: "案件 プロジェクト 工事" },
      { type: "nav", label: "日報", target: "reports", kw: "日報 daily" },
      { type: "nav", label: "安全品質", target: "safety", kw: "安全 KY 危険予知 品質" },
      { type: "nav", label: "原価管理", target: "cost", kw: "原価 コスト 予実" },
      ...PROJECTS.map(p => ({ type: "project", label: p.name, sub: p.code, kw: `${p.name} ${p.code} ${p.client}`, target: `projects` })),
      ...INCIDENTS.map(i => ({ type: "incident", label: i.title, sub: i.id, kw: `${i.id} ${i.title}`, target: `itsm` })),
    ];
    if (!q) return base.slice(0, 8);
    return base.filter(it => (it.kw || it.label).toLowerCase().includes(q.toLowerCase())).slice(0, 10);
  }, [q]);

  if (!open) return null;

  return (
    <div role="dialog" aria-modal="true" aria-label="グローバル検索"
      style={{
        position: "fixed", inset: 0, background: "rgba(15,23,42,0.55)", zIndex: 1000,
        display: "flex", justifyContent: "center", alignItems: "flex-start", paddingTop: "10vh",
      }}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{
        width: "min(640px, 92vw)", background: "#fff", borderRadius: "var(--r-xl)",
        boxShadow: "var(--e3)", overflow: "hidden",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 20px", borderBottom: "1px solid var(--line)" }}>
          <Icons.Search size={20} />
          <input ref={inputRef} value={q} onChange={(e) => setQ(e.target.value)}
            placeholder="案件・日報・ナレッジ・コマンドを検索..."
            aria-label="グローバル検索"
            style={{
              flex: 1, border: 0, outline: "none", fontSize: "var(--fs-16)",
              background: "transparent", padding: "6px 0",
            }}
            onKeyDown={(e) => e.key === "Escape" && onClose()}
          />
          <kbd style={{
            fontFamily: "var(--font-mono)", fontSize: "var(--fs-12)",
            padding: "2px 8px", background: "var(--gray-10)", borderRadius: "var(--r-sm)",
            border: "1px solid var(--gray-20)", color: "var(--gray-70)",
          }}>ESC</kbd>
        </div>
        <div style={{ maxHeight: 420, overflow: "auto", padding: 8 }}>
          {items.length === 0 && (
            <div style={{ padding: 32, textAlign: "center", color: "var(--gray-60)", fontSize: "var(--fs-14)" }}>結果なし</div>
          )}
          {items.map((it, i) => (
            <button key={i} onClick={() => { onNavigate(it.target); onClose(); }}
              style={{
                display: "flex", width: "100%", alignItems: "center", gap: 12,
                padding: "12px 14px", background: "transparent", border: 0, borderRadius: "var(--r-md)",
                textAlign: "left", fontSize: "var(--fs-14)", color: "var(--gray-100)",
                cursor: "pointer",
              }}
              onMouseEnter={(e) => e.currentTarget.style.background = "var(--brand-10)"}
              onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
            >
              <span style={{
                width: 32, height: 32, borderRadius: "var(--r-sm)",
                background: it.type === "nav" ? "var(--brand-10)" : it.type === "project" ? "var(--ok-10)" : "var(--warn-10)",
                color:       it.type === "nav" ? "var(--brand-60)": it.type === "project" ? "var(--ok-60)"  : "var(--warn-60)",
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
              }}>
                {it.type === "nav" ? <Icons.ChevronR size={16} /> : it.type === "project" ? <Icons.Building size={16} /> : <Icons.Alert size={16} />}
              </span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.label}</div>
                {it.sub && <div style={{ fontSize: "var(--fs-12)", color: "var(--gray-60)", fontFamily: "var(--font-mono)", marginTop: 2 }}>{it.sub}</div>}
              </div>
              <span style={{ fontSize: "var(--fs-12)", color: "var(--gray-50)", textTransform: "uppercase", letterSpacing: 0.06 }}>{it.type}</span>
            </button>
          ))}
        </div>
        <div style={{
          padding: "10px 20px", borderTop: "1px solid var(--line)",
          fontSize: "var(--fs-12)", color: "var(--gray-60)",
          display: "flex", gap: 16, justifyContent: "flex-end",
        }}>
          <span><kbd style={{fontFamily:"var(--font-mono)", padding:"1px 5px", background:"var(--gray-10)", borderRadius:3, border:"1px solid var(--gray-20)"}}>↵</kbd> で移動</span>
          <span><kbd style={{fontFamily:"var(--font-mono)", padding:"1px 5px", background:"var(--gray-10)", borderRadius:3, border:"1px solid var(--gray-20)"}}>⌘K</kbd> で開閉</span>
        </div>
      </div>
    </div>
  );
}

                </div>
                <div style={{ position: "relative", height: 10, background: "var(--gray-10)", borderRadius: "var(--r-pill)", overflow: "hidden" }}>

                </div>
              </div>

          })}

      <Card padding={0}>
        <div style={{ padding: "18px 24px", borderBottom: "1px solid var(--line)" }}>

        <div role="table">
          <div role="row" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr 1fr", padding: "10px 24px", background: "var(--gray-10)", fontSize: "var(--fs-12)", fontWeight: 600, color: "var(--gray-70)", textTransform: "uppercase", letterSpacing: "0.06em", borderBottom: "1px solid var(--line)" }}>

          </div>
          {PROJECTS.filter(p => p.budget > 0).map((p, i, arr) => {
            const diff = p.budget - p.actual;
            const rate = p.actual / p.budget * 100;
            return (
              <div key={p.id} role="row" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr 1fr", padding: "14px 24px", fontSize: "var(--fs-14)", borderBottom: i < arr.length - 1 ? "1px solid var(--line)" : "none", alignItems: "center", fontVariantNumeric: "tabular-nums" }}>
                <span style={{ fontWeight: 500 }}>{p.name}</span>
                <span style={{ textAlign: "right", color: "var(--gray-70)" }}>¥{p.budget.toLocaleString()}</span>
                <span style={{ textAlign: "right", fontWeight: 600 }}>¥{p.actual.toLocaleString()}</span>
                <span style={{ textAlign: "right", color: diff >= 0 ? "var(--ok-60)" : "var(--err-60)", fontWeight: 600 }}>{diff >= 0 ? "+" : ""}¥{diff.toLocaleString()}</span>
                <span style={{ textAlign: "right" }}><Badge tone={rate > 100 ? "err" : rate > 95 ? "warn" : "ok"} size="sm">{rate.toFixed(1)}%</Badge></span>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

                    {["ライト", "ダーク", "システム"].map((t, i) => (
                      <button key={t} style={{ flex: 1, minHeight: 48, border: `2px solid ${i === 0 ? "var(--brand-60)" : "var(--line)"}`, borderRadius: "var(--r-md)", background: "#fff", cursor: "pointer", fontSize: "var(--fs-14)", fontWeight: i === 0 ? 600 : 500 }}>{t}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={{ fontSize: "var(--fs-12)", fontWeight: 600, color: "var(--gray-70)", display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>文字サイズ</label>
                  <div style={{ display: "flex", gap: 10 }}>
                    {[{s:"小", f:14}, {s:"標準", f:16}, {s:"大", f:18}].map((x, i) => (
                      <button key={x.s} style={{ flex: 1, minHeight: 48, border: `2px solid ${i === 1 ? "var(--brand-60)" : "var(--line)"}`, borderRadius: "var(--r-md)", background: "#fff", cursor: "pointer", fontSize: x.f, fontWeight: i === 1 ? 600 : 500 }}>{x.s} ({x.f}px)</button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={{ fontSize: "var(--fs-12)", fontWeight: 600, color: "var(--gray-70)", display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>言語</label>
                  <select style={{ width: "100%", height: "var(--touch)", padding: "0 14px", border: "1px solid var(--gray-30)", borderRadius: "var(--r-md)", fontSize: "var(--fs-14)", background: "#fff" }}>
                    <option>日本語 (ja-JP)</option><option>English (en-US)</option><option>中文 (zh-CN)</option>
                  </select>
                </div>
              </div>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════════════════════════ */
function App() {
  const [active, setActive] = useState(() => localStorage.getItem("sh2:page") || "dashboard");
  const [cmdOpen, setCmdOpen] = useState(false);
  const [online] = useState(true);

  useEffect(() => { localStorage.setItem("sh2:page", active); }, [active]);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setCmdOpen((o) => !o);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const pageInfo = {
    dashboard: { crumb: ["ServiceHub", "ダッシュボード"], render: () => <DashboardPage onNavigate={setActive} /> },
    projects:  { crumb: ["ServiceHub", "業務", "工事案件"], render: () => <ProjectsPage /> },
    reports:   { crumb: ["ServiceHub", "業務", "日報 · 工程表"], render: () => <ReportsPage /> },
    photos:    { crumb: ["ServiceHub", "業務", "写真 · 電子小黒板"], render: () => <PhotosPage /> },
    safety:    { crumb: ["ServiceHub", "運用", "安全 · 品質"], render: () => <SafetyPage /> },
    portal:    { crumb: ["ServiceHub", "社内", "ポータルTOP"],      render: () => <PortalPage tab="top" /> },
    notices:   { crumb: ["ServiceHub", "社内", "お知らせ・掲示板"],  render: () => <PortalPage tab="notices" /> },
    hr:        { crumb: ["ServiceHub", "社内", "人事・勤怠"],        render: () => <PortalPage tab="hr" /> },
    rules:     { crumb: ["ServiceHub", "社内", "規程・手続き"],      render: () => <PortalPage tab="rules" /> },
    cost:      { crumb: ["ServiceHub", "運用", "原価管理"], render: () => <CostPage /> },
    itsm:      { crumb: ["ServiceHub", "運用", "ITSM"], render: () => <ITSMPage /> },
    knowledge: { crumb: ["ServiceHub", "運用", "ナレッジ"], render: () => <KnowledgePage /> },
    users:     { crumb: ["ServiceHub", "管理", "ユーザー管理"], render: () => <UsersPage /> },
    notif:     { crumb: ["ServiceHub", "管理", "通知設定"], render: () => <NotifPage /> },
    settings:  { crumb: ["ServiceHub", "管理", "設定"], render: () => <SettingsPage /> },
  };
  const current = pageInfo[active] || pageInfo.dashboard;

  return (
    <>
      <div style={{ display: "flex", minHeight: "100vh" }}>
        <Sidebar active={active} onNavigate={setActive} />
        <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
          <TopBar breadcrumb={current.crumb} onOpenSearch={() => setCmdOpen(true)} online={online} />
          <main id="main-content" style={{ flex: 1, padding: "32px 32px 64px", maxWidth: 1440, width: "100%", margin: "0 auto" }}>
            {current.render()}
          </main>
        </div>
      </div>
      <CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} onNavigate={setActive} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
