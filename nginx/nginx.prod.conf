worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance ────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Logging ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Compression ────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_min_length    256;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # ── Upstreams ──────────────────────────────────────────────────
    upstream api      { server api:8000; }
    upstream frontend { server frontend:3000; }

    # ── Security headers (applied to all responses, including errors) ──
    # CSP: self-only scripts, inline styles allowed for CSS-in-JS libs,
    # SSE over same-origin (connect-src 'self'), no framing, no objects.
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'";
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Security headers — `always` keeps them on error responses too
        add_header X-Content-Type-Options      "nosniff"                       always;
        add_header X-Frame-Options             "DENY"                          always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy          "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy     $csp_header                     always;
        # HSTS is intentionally NOT set here: should only be enabled once TLS
        # is terminated at this layer (add to a 443 server block later).

        # SPA / frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # REST API
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        # SSE — disable buffering and keep the connection long-lived
        location /sse/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 24h;
            chunked_transfer_encoding on;
        }

        location /health { proxy_pass http://api/health; }

        # /docs (FastAPI Swagger UI) — keep for now; consider gating in prod
        location /docs   { proxy_pass http://api/docs; }
        location /openapi.json { proxy_pass http://api/openapi.json; }
    }
}
