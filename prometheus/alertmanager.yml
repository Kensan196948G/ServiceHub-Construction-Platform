global:
  resolve_timeout: 5m
  smtp_smarthost: "localhost:587"
  smtp_from: "alertmanager@servicehub.example.com"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    email_configs:
      - to: "ops-team@servicehub.example.com"
        send_resolved: true

  - name: "critical"
    email_configs:
      - to: "on-call@servicehub.example.com"
        send_resolved: true
    # Uncomment to enable Slack notifications:
    # slack_configs:
    #   - api_url: "${SLACK_WEBHOOK_URL}"
    #     channel: "#alerts-critical"
    #     send_resolved: true
    #     title: "{{ .GroupLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
