version: "3.9"

# Fullstack E2E test compose — used by Phase 7b CI workflow
# Starts backend + frontend + db + redis, then runs Playwright inside a dedicated container

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: servicehub
      POSTGRES_PASSWORD: servicehub
      POSTGRES_DB: servicehub_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicehub -d servicehub_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    environment:
      DATABASE_URL: "postgresql+asyncpg://servicehub:servicehub@db:5432/servicehub_test"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "e2e-test-secret-key-ci-only"
      JWT_ALGORITHM: HS256
      ENVIRONMENT: test
      LOG_LEVEL: WARNING
      LOGIN_RATE_LIMIT: "1000/minute"
      REFRESH_RATE_LIMIT: "1000/minute"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seeds.seed_test_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - test-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    volumes:
      - ./frontend/docker/nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - test-net

  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    working_dir: /app
    environment:
      BASE_URL: "http://frontend:3000"
      API_BASE_URL: "http://api:8000"
      CI: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm ci --legacy-peer-deps &&
             npx playwright install --with-deps chromium &&
             npx playwright test --config playwright.fullstack.config.ts --reporter=list"
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
