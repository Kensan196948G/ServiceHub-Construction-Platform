# nginx config for fullstack E2E test environment (docker-compose.test.yml)
# Proxies /api and /health to the backend container; serves SPA for all other routes.

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Proxy API requests to backend container
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Proxy health endpoints to backend container
    location /health/ {
        proxy_pass         http://api:8000/health/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    # Long-term immutable cache for Vite content-hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: client-side routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
