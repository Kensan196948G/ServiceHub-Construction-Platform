# Frontend container internal nginx — serves Vite-built SPA on :3000.
# Security headers (CSP/X-Frame-Options/etc.) are enforced by the outer
# reverse-proxy nginx at the edge, not here.

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable server tokens (don't leak version)
    server_tokens off;

    # gzip for text assets (brotli would require nginx-module-brotli)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Long-term immutable cache for Vite's content-hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static files with extensions: let browser cache for a day
    location ~* \.(?:ico|gif|jpe?g|png|webp|avif|svg|woff2?|ttf|eot|otf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Never cache the SPA shell — must pick up new deploys immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA fallback: client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden dotfiles (.git, .env-ish leftovers)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
