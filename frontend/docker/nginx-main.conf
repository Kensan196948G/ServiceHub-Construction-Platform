# Main nginx.conf for non-root container execution (user: "1000:1000" in docker-compose override)
# Redirect all writable paths to /tmp so no root-owned directory is needed.

worker_processes auto;

# PID file in /tmp (writable by any user)
pid /tmp/nginx.pid;

# Avoid "user" directive — unnecessary when already running as non-root
# (nginx:alpine default has "user nginx;" which triggers a warning as non-root)

events {
    worker_connections 1024;
}

http {
    # Temp paths writable by non-root user
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path       /tmp/nginx_proxy_temp;
    fastcgi_temp_path     /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path       /tmp/nginx_uwsgi_temp;
    scgi_temp_path        /tmp/nginx_scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Access log to stdout, error log to stderr
    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    include /etc/nginx/conf.d/*.conf;
}
